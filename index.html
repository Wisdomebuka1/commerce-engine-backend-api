<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Products</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-count {
      background: green;
      color: white;
      padding: 5px 10px;
      border-radius: 50%;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      border: 1px solid #ddd;
      padding: 10px;
      border-radius: 10px;
    }

    img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    button {
      width: 100%;
      padding: 8px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: green;
    }

    /* CART SECTION */
    #cartPage {
      display: none;
      margin-top: 20px;
    }

    .cart-item {
      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .remove {
      background: red;
      padding: 5px 10px;
      cursor: pointer;
    }


    p, b{
      font-size: 0.5rem;
      color: #555;
    }

    a{
      text-decoration: none;
      color:#444;
    }
  </style>
</head>

<body>

<div class="top-bar">
  <h1><a href="index.html">Products</a></h1>

  <div onclick="toggleCart()">
    Cart: <span id="cartCount" class="cart-count">0</span>
  </div>
</div>

<!-- PRODUCTS -->
<div id="products" class="grid"></div>

<!-- CART PAGE -->
<div id="cartPage">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
</div>

<script>
  const API_URL = "https://commerce-engine-backend-api.onrender.com/api/v1/product/all-products";

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  const productsDiv = document.getElementById("products");
  const cartPage = document.getElementById("cartPage");
  const cartItemsDiv = document.getElementById("cartItems");

  function updateCartCount() {
    document.getElementById("cartCount").innerText = cart.length;
  }

  function addToCart(product) {
    cart.push(product);
    localStorage.setItem("cart", JSON.stringify(cart));
    updateCartCount();
    alert(`${product.productName} added to cart`);
  }

  function removeFromCart(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    updateCartCount();
    renderCart();
  }

  function toggleCart() {
    if (cartPage.style.display === "block") {
      cartPage.style.display = "none";
      productsDiv.style.display = "grid";
    } else {
      cartPage.style.display = "block";
      productsDiv.style.display = "none";
      renderCart();
    }
  }

  function renderCart() {
    if (cart.length === 0) {
      cartItemsDiv.innerHTML = "<p>Your cart is empty</p>";
      return;
    }

    cartItemsDiv.innerHTML = cart.map((item, index) => `
      <div class="cart-item">
        <div>
          <h4>${item.productName}</h4>
          <p>₦${item.price}</p>
        </div>

        <button class="remove" onclick="removeFromCart(${index})">
          Remove
        </button>
      </div>
    `).join("");
  }

  async function getProducts() {
    const res = await fetch(API_URL);
    const data = await res.json();

    productsDiv.innerHTML = data.data.map(product => `
      <div class="card">
        <img src="${product.image.url}" />
        <h3>${product.productName}</h3>
        <p>${product.productDesc}</p>
        <p>${product.quantity} items left</p>
        <p><b>₦${product.price}</b></p>

        <button onclick='addToCart(${JSON.stringify(product).replace(/'/g, "&apos;")})'>
          Add to Cart
        </button>
      </div>
    `).join("");
  }

  updateCartCount();
  getProducts();
</script>

</body>
</html>
